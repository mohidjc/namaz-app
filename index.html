<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf6ef">
<title>Prayer Times</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Prayer Times">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-top: #faf6ef;
    --bg-mid: #f5efe4;
    --bg-bottom: #ede5d5;
    --text-primary: #1a1208;
    --text-muted: #6b5c3e;
    --text-dim: #9a8d76;
    --gold: #8b6914;
    --gold-bright: #6b5010;
    --gold-dim: #b89e56;
    --green: #0d6e2e;
    --green-soft: #1a8a3a;
    --green-bg: rgba(20,120,50,0.1);
    --green-border: rgba(20,120,50,0.3);
    --brown: #3a3010;
    --brown-soft: #4a4020;
    --brown-bg: rgba(60,50,10,0.06);
    --brown-border: rgba(60,50,10,0.2);
    --red: #a03020;
    --red-soft: #b04030;
    --red-bg: rgba(160,48,32,0.06);
    --red-border: rgba(160,48,32,0.2);
    --row-bg: rgba(0,0,0,0.04);
    --green-row-bg: rgba(20,120,50,0.08);
    --green-row-border: rgba(20,120,50,0.2);
    --brown-row-bg: rgba(60,50,10,0.05);
    --brown-row-border: rgba(60,50,10,0.15);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    direction: rtl;
    position: fixed;
    top: 0; left: 0;
  }

  .app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 12px);
    position: relative;
    overflow: hidden;
  }

  .pattern-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.03;
    background-image: repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg 80deg, rgba(0,0,0,0.15) 80deg 90deg);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.8vh;
  }

  .bismillah {
    color: var(--gold);
    font-size: clamp(13px, 3.2vw, 16px);
    text-align: center;
  }

  .jummah-banner {
    color: var(--gold-bright);
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 700;
    text-align: center;
    display: none;
  }

  .jummah-banner.visible {
    display: block;
  }

  .current-time-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    direction: rtl;
    width: 100%;
  }

  .current-time-label {
    color: var(--text-muted);
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 500;
  }

  .current-time-clock {
    color: var(--text-primary);
    font-size: clamp(38px, 11vw, 52px);
    font-weight: 600;
    letter-spacing: 2px;
  }

  .status-banner {
    width: 100%;
    border-radius: 14px;
    padding: clamp(10px, 2vh, 16px) 14px;
    text-align: center;
  }

  .status-banner.current {
    background: var(--green-bg);
    border: 1.5px solid var(--green-border);
  }

  .status-banner.next {
    background: var(--brown-bg);
    border: 1.5px solid var(--brown-border);
  }

  .status-banner.not-time {
    background: var(--red-bg);
    border: 1.5px solid var(--red-border);
  }

  .status-text {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 600;
    line-height: 1.5;
  }

  .status-banner.current .status-text { color: var(--green); }
  .status-banner.next .status-text { color: var(--brown); }
  .status-banner.not-time .status-text { color: var(--red); }

  .countdown-text {
    color: var(--brown-soft);
    font-size: clamp(17px, 4.5vw, 22px);
    font-weight: 600;
    margin-top: 6px;
  }

  .prayer-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .prayer-row {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: clamp(8px, 1.5vh, 12px) 14px;
    border-radius: 10px;
    background: var(--row-bg);
    text-align: center;
  }

  .prayer-row.current-prayer {
    background: var(--green-row-bg);
    border: 1.5px solid var(--green-row-border);
  }

  .prayer-sentence {
    font-size: clamp(14px, 3.8vw, 17px);
    font-weight: 500;
  }

  .prayer-sentence.done {
    color: var(--green-soft);
  }

  .prayer-sentence.not-yet {
    color: var(--red-soft);
  }

  .prayer-sentence.active {
    color: var(--green);
    font-weight: 600;
  }

  .footer-text {
    color: var(--gold-dim);
    font-size: clamp(11px, 2.5vw, 13px);
    text-align: center;
  }

  .loading-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  .loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    color: var(--gold);
    font-size: 18px;
    text-align: center;
  }

  .pulse { animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <p class="loading-text pulse">بسم اللہ الرحمٰن الرحیم</p>
</div>

<div class="app">
  <div class="pattern-overlay"></div>
  <div class="content">
    <p class="bismillah">بسم اللہ الرحمٰن الرحیم</p>
    <p class="jummah-banner" id="jummahBanner">آج جمعہ ہے</p>

    <div class="current-time-row">
      <span class="current-time-label">ابھی وقت</span>
      <span class="current-time-clock" id="currentClock">--:--</span>
    </div>

    <div class="status-banner current" id="currentBanner" style="display:none;">
      <p class="status-text" id="currentBannerText"></p>
    </div>

    <div class="status-banner next" id="nextBanner" style="display:none;">
      <p class="status-text" id="nextBannerText"></p>
      <p class="countdown-text" id="countdownText"></p>
    </div>

    <div class="prayer-list" id="prayerList"></div>

    <p class="footer-text">اللہ اکبر اللہ اکبر</p>
  </div>
</div>

<script>
const PRAYER_NAMES_URDU = {
  Fajr: 'فجر',
  Dhuhr: 'ظہر',
  Asr: 'عصر',
  Maghrib: 'مغرب',
  Isha: 'عشاء'
};

const PRAYER_ORDER = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
const FIFTEEN_MINUTES = 15 * 60 * 1000;

let prayerTimes = null;
let sunriseTime = null;
let cachedDate = null;

function formatTime12(dateObj) {
  let h = dateObj.getHours();
  let m = dateObj.getMinutes();
  h = h % 12;
  if (h === 0) h = 12;
  const mStr = m < 10 ? '0' + m : m;
  return h + ':' + mStr;
}

function parseTime(timeStr) {
  const parts = timeStr.split(':');
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(parts[0]), parseInt(parts[1]));
}

function getCountdownUrdu(diffMs) {
  const totalMins = Math.ceil(diffMs / 60000);
  if (totalMins < 1) return 'ابھی';
  if (totalMins < 60) {
    return 'تقریباً ' + totalMins + ' منٹ باقی';
  }
  const hours = Math.floor(totalMins / 60);
  const mins = totalMins % 60;
  if (mins === 0) {
    return 'تقریباً ' + hours + ' گھنٹے باقی';
  }
  return 'تقریباً ' + hours + ' گھنٹے ' + mins + ' منٹ باقی';
}

async function fetchPrayerTimes() {
  const today = new Date();
  const dateStr = today.getDate() + '-' + (today.getMonth() + 1) + '-' + today.getFullYear();

  if (cachedDate === dateStr && prayerTimes) {
    return prayerTimes;
  }

  try {
    const url = 'https://api.aladhan.com/v1/timingsByCity/' + dateStr + '?city=Manchester&country=United+Kingdom&method=15';
    const response = await fetch(url);
    const data = await response.json();
    const timings = data.data.timings;

    prayerTimes = {};
    PRAYER_ORDER.forEach(name => {
      prayerTimes[name] = timings[name].replace(/\s*\(.*\)/, '');
    });

    sunriseTime = timings.Sunrise.replace(/\s*\(.*\)/, '');
    cachedDate = dateStr;

    try {
      localStorage.setItem('cachedPrayerTimes', JSON.stringify(prayerTimes));
      localStorage.setItem('cachedSunrise', sunriseTime);
      localStorage.setItem('cachedPrayerDate', dateStr);
    } catch(e) {}

    return prayerTimes;
  } catch (e) {
    try {
      const cached = localStorage.getItem('cachedPrayerTimes');
      const cachedS = localStorage.getItem('cachedSunrise');
      const cachedD = localStorage.getItem('cachedPrayerDate');
      if (cached && cachedD === dateStr) {
        prayerTimes = JSON.parse(cached);
        sunriseTime = cachedS;
        cachedDate = dateStr;
        return prayerTimes;
      }
    } catch(e2) {}
    return null;
  }
}

function getCurrentAndNextPrayer(times) {
  const now = new Date();

  const fajrStart = parseTime(times['Fajr']);
  const sunrise = sunriseTime ? parseTime(sunriseTime) : null;
  const dhuhrStart = parseTime(times['Dhuhr']);
  const asrStart = parseTime(times['Asr']);
  const maghribStart = parseTime(times['Maghrib']);
  const ishaStart = parseTime(times['Isha']);

  if (now < fajrStart) return { currentPrayer: null, nextPrayer: 'Fajr' };
  if (sunrise && now >= fajrStart && now < sunrise) return { currentPrayer: 'Fajr', nextPrayer: 'Dhuhr' };
  if (sunrise && now >= sunrise && now < dhuhrStart) return { currentPrayer: null, nextPrayer: 'Dhuhr' };
  if (now >= dhuhrStart && now < asrStart) return { currentPrayer: 'Dhuhr', nextPrayer: 'Asr' };
  if (now >= asrStart && now < maghribStart) return { currentPrayer: 'Asr', nextPrayer: 'Maghrib' };
  if (now >= maghribStart && now < ishaStart) return { currentPrayer: 'Maghrib', nextPrayer: 'Isha' };
  if (now >= ishaStart) return { currentPrayer: 'Isha', nextPrayer: null };
  return { currentPrayer: null, nextPrayer: 'Fajr' };
}

function getPrayerRowStatus(prayerName, times) {
  const now = new Date();
  const prayerStart = parseTime(times[prayerName]);
  const diff = now - prayerStart;

  if (now < prayerStart) return 'not-yet';
  if (diff < FIFTEEN_MINUTES) return 'within15';
  return 'done';
}

function isFriday() {
  return new Date().getDay() === 5;
}

function getPrayerNameUrdu(name) {
  if (name === 'Dhuhr' && isFriday()) return 'جمعہ';
  return PRAYER_NAMES_URDU[name];
}

function getPrayerTime12(times, name) {
  const t = parseTime(times[name]);
  return formatTime12(t);
}

function updateUI() {
  if (!prayerTimes) return;

  const now = new Date();
  document.getElementById('currentClock').textContent = formatTime12(now);

  const jummahBanner = document.getElementById('jummahBanner');
  if (isFriday()) { jummahBanner.classList.add('visible'); }
  else { jummahBanner.classList.remove('visible'); }

  const { currentPrayer, nextPrayer } = getCurrentAndNextPrayer(prayerTimes);

  const currentBanner = document.getElementById('currentBanner');
  const currentBannerText = document.getElementById('currentBannerText');
  const nextBanner = document.getElementById('nextBanner');
  const nextBannerText = document.getElementById('nextBannerText');
  const countdownText = document.getElementById('countdownText');

  if (currentPrayer) {
    const nameUrdu = getPrayerNameUrdu(currentPrayer);
    currentBanner.style.display = 'block';
    currentBanner.className = 'status-banner current';
    currentBannerText.textContent = 'ابھی ' + nameUrdu + ' کی نماز کا وقت ہے';
  } else {
    currentBanner.style.display = 'block';
    currentBanner.className = 'status-banner not-time';
    currentBannerText.textContent = 'ابھی نماز کا وقت نہیں ہے';
  }

  if (nextPrayer) {
    const nextNameUrdu = getPrayerNameUrdu(nextPrayer);
    const nextTime12 = getPrayerTime12(prayerTimes, nextPrayer);
    nextBanner.style.display = 'block';
    nextBannerText.textContent = 'اگلی نماز ' + nextNameUrdu + ' ہے اور وہ ' + nextTime12 + ' بجے ہے — ابھی نہیں';
    const nextPrayerDate = parseTime(prayerTimes[nextPrayer]);
    const diff = nextPrayerDate - now;
    countdownText.textContent = diff > 0 ? getCountdownUrdu(diff) : '';
  } else {
    const fajrTime12 = getPrayerTime12(prayerTimes, 'Fajr');
    nextBanner.style.display = 'block';
    nextBannerText.textContent = 'اگلی نماز فجر ہے اور وہ ' + fajrTime12 + ' بجے ہے — ابھی نہیں';
    const tomorrowFajr = parseTime(prayerTimes['Fajr']);
    tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
    const diff = tomorrowFajr - now;
    countdownText.textContent = diff > 0 ? getCountdownUrdu(diff) : '';
  }

  // Prayer list — full sentences
  const prayerList = document.getElementById('prayerList');
  prayerList.innerHTML = '';

  PRAYER_ORDER.forEach(name => {
    const row = document.createElement('div');
    row.className = 'prayer-row';

    const displayName = getPrayerNameUrdu(name);
    const rowStatus = getPrayerRowStatus(name, prayerTimes);

    const sentence = document.createElement('span');
    sentence.className = 'prayer-sentence';

    if (rowStatus === 'done') {
      sentence.classList.add('done');
      sentence.textContent = displayName + ' آپ نے پڑھ لی ہے';
    } else if (rowStatus === 'not-yet') {
      sentence.classList.add('not-yet');
      sentence.textContent = displayName + ' ابھی وقت نہیں ہوا';
    } else {
      // within 15 mins — just show the name highlighted
      row.classList.add('current-prayer');
      sentence.classList.add('active');
      sentence.textContent = '◀ ' + displayName;
    }

    row.appendChild(sentence);
    prayerList.appendChild(row);
  });
}

async function init() {
  const times = await fetchPrayerTimes();
  if (times) {
    updateUI();
    document.getElementById('loadingScreen').classList.add('hidden');
    setInterval(updateUI, 1000);
    setInterval(async () => { await fetchPrayerTimes(); }, 3600000);
  } else {
    document.querySelector('.loading-text').textContent = 'انٹرنیٹ سے جڑیں';
    document.querySelector('.loading-text').classList.remove('pulse');
  }
}

init();

let lastDate = new Date().getDate();
setInterval(() => {
  const today = new Date().getDate();
  if (today !== lastDate) {
    lastDate = today;
    cachedDate = null;
    fetchPrayerTimes().then(() => updateUI());
  }
}, 60000);
</script>
</body>
</html>
